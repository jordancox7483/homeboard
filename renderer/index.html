<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeBoard</title>

  <!-- Bundled fonts from node_modules — loaded from local filesystem, no network required -->
  <link rel="stylesheet" href="../node_modules/@fontsource/playfair-display/400.css" />
  <link rel="stylesheet" href="../node_modules/@fontsource/playfair-display/700.css" />
  <link rel="stylesheet" href="../node_modules/@fontsource/dm-mono/400.css" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Background photos ── -->
  <div id="background">
    <img id="photo-a" class="bg-photo active" alt="" />
    <img id="photo-b" class="bg-photo" alt="" />
    <div class="vignette"></div>
  </div>

  <!-- ── Top-left: Clock + Date ── -->
  <div id="top-left">
    <div id="clock">--:--</div>
    <div id="ampm">--</div>
    <div id="date-line">--, --- --</div>
  </div>

  <!-- ── Top-right: Weather ── -->
  <div id="top-right" class="glass-panel">
    <div id="weather-icon" class="weather-icon">--</div>
    <div id="weather-temp" class="weather-temp">--°</div>
    <div id="weather-desc" class="weather-desc">Loading...</div>
    <div id="weather-detail" class="weather-detail"></div>
  </div>

  <!-- ── Bottom: Calendar panel ── -->
  <div id="bottom-panel" class="glass-panel">
    <div id="google-warning" class="google-warning hidden">
      Google Calendar not connected — run <code>npm run setup-auth</code>
    </div>
    <div id="event-list"></div>
  </div>

  <!-- ── Photo credit ── -->
  <div id="photo-credit"></div>

  <!-- ── Settings trigger ── -->
  <button id="settings-btn" title="Calendar settings (S)">&#9881;</button>

  <!-- ── Settings panel ── -->
  <div id="settings-panel" class="hidden">
    <div class="sp-inner">
      <div class="sp-header">
        <span class="sp-title">Calendar Panel</span>
        <button id="settings-close" class="sp-close">&#10005;</button>
      </div>

      <div class="sp-row">
        <label>Layout</label>
        <div class="toggle-group">
          <button data-layout="horizontal" class="toggle-btn active">Horizontal</button>
          <button data-layout="vertical"   class="toggle-btn">Vertical</button>
        </div>
      </div>

      <div class="sp-row side-row" style="display:none">
        <label>Side</label>
        <div class="toggle-group">
          <button data-side="left"  class="toggle-btn">Left</button>
          <button data-side="right" class="toggle-btn active">Right</button>
        </div>
      </div>

      <div class="sp-row">
        <label>Opacity <span id="opacity-val">60%</span></label>
        <input type="range" id="opacity-slider" min="10" max="95" value="60" />
      </div>

      <div class="sp-row">
        <label>Panel width <span id="width-val">320px</span></label>
        <input type="range" id="width-slider" min="180" max="600" value="320" />
      </div>

      <div class="sp-row">
        <label>Card min-width <span id="cardmin-val">180px</span></label>
        <input type="range" id="cardmin-slider" min="120" max="320" value="180" />
      </div>

      <div class="sp-row">
        <label>Font size <span id="fontsize-val">13px</span></label>
        <input type="range" id="fontsize-slider" min="10" max="22" value="13" />
      </div>

      <div class="sp-row">
        <label>Card gap <span id="gap-val">16px</span></label>
        <input type="range" id="gap-slider" min="4" max="40" value="16" />
      </div>

      <div class="sp-actions">
        <button id="settings-save" class="sp-btn-save">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
