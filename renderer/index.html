<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeBoard</title>

  <!-- Bundled fonts from node_modules — loaded from local filesystem, no network required -->
  <link rel="stylesheet" href="../node_modules/@fontsource/playfair-display/400.css" />
  <link rel="stylesheet" href="../node_modules/@fontsource/playfair-display/700.css" />
  <link rel="stylesheet" href="../node_modules/@fontsource/dm-mono/400.css" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Background photos ── -->
  <div id="background">
    <img id="photo-a" class="bg-photo active" alt="" />
    <img id="photo-b" class="bg-photo" alt="" />
    <div class="vignette"></div>
  </div>

  <!-- ── Top-left: Clock + Date ── -->
  <div id="top-left">
    <div id="clock">--:--</div>
    <div id="ampm">--</div>
    <div id="date-line">--, --- --</div>
    <div class="widget-resize-handle" data-widget="clock"></div>
  </div>

  <!-- ── Top-right: Weather ── -->
  <div id="top-right" class="glass-panel">
    <div id="weather-icon" class="weather-icon">--</div>
    <div id="weather-temp" class="weather-temp">--°</div>
    <div id="weather-desc" class="weather-desc">Loading...</div>
    <div id="weather-detail" class="weather-detail"></div>
    <div id="forecast-strip" class="forecast-strip hidden"></div>
    <div class="widget-resize-handle" data-widget="weather"></div>
  </div>

  <!-- ── Bottom: Calendar panel ── -->
  <div id="bottom-panel" class="glass-panel">
    <div id="google-warning" class="google-warning hidden">
      Google Calendar not connected — run <code>npm run setup-auth</code>
    </div>
    <div id="event-list"></div>
  </div>

  <!-- ── Photo credit ── -->
  <div id="photo-credit"></div>

  <!-- ── Settings trigger ── -->
  <button id="settings-btn" title="Calendar settings (S)">&#9881;</button>

  <!-- ── Settings panel ── -->
  <div id="settings-panel" class="hidden">
    <div class="sp-inner">
      <div class="sp-header">
        <span class="sp-title">Settings</span>
        <button id="settings-close" class="sp-close">&#10005;</button>
      </div>

      <!-- ── Calendar ── -->
      <div class="sp-section" style="margin-top:0;padding-top:0;border-top:none">Calendar</div>

      <div class="sp-row">
        <label>Layout</label>
        <div class="toggle-group">
          <button data-layout="horizontal" class="toggle-btn active">Horizontal</button>
          <button data-layout="vertical"   class="toggle-btn">Vertical</button>
        </div>
      </div>

      <div class="sp-row side-row" style="display:none">
        <label>Side</label>
        <div class="toggle-group">
          <button data-side="left"  class="toggle-btn">Left</button>
          <button data-side="right" class="toggle-btn active">Right</button>
        </div>
      </div>

      <div class="sp-row">
        <label>Opacity <span id="opacity-val">60%</span></label>
        <input type="range" id="opacity-slider" min="10" max="95" value="60" />
      </div>

      <div class="sp-row">
        <label>Panel width <span id="width-val">320px</span></label>
        <input type="range" id="width-slider" min="180" max="1400" value="320" />
      </div>

      <div class="sp-row">
        <label>Card min-width <span id="cardmin-val">180px</span></label>
        <input type="range" id="cardmin-slider" min="120" max="600" value="180" />
      </div>

      <div class="sp-row">
        <label>Font size <span id="fontsize-val">13px</span></label>
        <input type="range" id="fontsize-slider" min="10" max="22" value="13" />
      </div>

      <div class="sp-row">
        <label>Card gap <span id="gap-val">16px</span></label>
        <input type="range" id="gap-slider" min="4" max="40" value="16" />
      </div>

      <div class="sp-row">
        <label>Card height <span id="cardheight-val">Auto</span></label>
        <input type="range" id="cardheight-slider" min="0" max="200" value="0" />
      </div>

      <div class="sp-actions">
        <button id="settings-save" class="sp-btn-save">Save Calendar</button>
      </div>

      <!-- ── Weather ── -->
      <div class="sp-section">Weather</div>

      <div class="sp-row">
        <label>Location <span id="location-current-label" class="location-current-label"></span></label>
        <div class="sp-location-row">
          <input type="text" id="location-input" placeholder="Search city…" />
          <button id="location-search-btn" class="sp-location-search-btn">Search</button>
        </div>
        <div id="location-results" class="location-results hidden"></div>
      </div>

      <div class="sp-row">
        <label>Forecast days <span id="forecast-days-val">3</span></label>
        <input type="range" id="forecast-days-slider" min="0" max="7" value="3" />
      </div>

      <div class="sp-row">
        <label>Units</label>
        <div class="toggle-group">
          <button data-units="fahrenheit" class="toggle-btn active">°F</button>
          <button data-units="celsius"    class="toggle-btn">°C</button>
        </div>
      </div>

      <div class="sp-actions" style="margin-top:10px">
        <button id="weather-save" class="sp-btn-save">Save Weather</button>
      </div>

      <!-- ── Widgets ── -->
      <div class="sp-section">Widgets</div>

      <div class="sp-row">
        <label style="margin-bottom:8px">Visibility</label>
        <div class="widget-vis-list">
          <div class="widget-vis-item"><span>Clock</span><button class="vis-btn active" data-vis="clock">On</button></div>
          <div class="widget-vis-item"><span>Weather</span><button class="vis-btn active" data-vis="weather">On</button></div>
          <div class="widget-vis-item"><span>Calendar</span><button class="vis-btn active" data-vis="calendar">On</button></div>
        </div>
      </div>

      <div class="sp-row" style="margin-top:10px">
        <div class="toggle-group">
          <button id="widget-lock-btn" class="toggle-btn">Unlock to move &amp; resize</button>
        </div>
      </div>

      <!-- ── Countdowns ── -->
      <div class="sp-section">Countdowns</div>

      <div id="cd-list" class="cd-list"></div>

      <div id="cd-form" class="hidden">
        <input type="hidden" id="cd-edit-id" />
        <div class="sp-row">
          <label>Title</label>
          <input type="text" id="cd-title" class="sp-text-input" placeholder="Event name" />
        </div>
        <div class="sp-row">
          <label>Target date</label>
          <input type="date" id="cd-date" class="sp-date-input" />
        </div>
        <div class="sp-row">
          <label>Accent color</label>
          <div class="sp-color-row">
            <input type="color" id="cd-color" class="sp-color-input" value="#C9A96E" />
            <span id="cd-color-label" style="font-family:var(--font-mono);font-size:10px;color:var(--white-dim)">#C9A96E</span>
          </div>
        </div>
        <div class="sp-form-actions">
          <button id="cd-save-btn" class="sp-btn-save" style="flex:1">Save</button>
          <button id="cd-cancel-btn" class="sp-btn-cancel">Cancel</button>
        </div>
      </div>

      <div id="cd-add-row" class="sp-actions" style="margin-top:6px">
        <button id="cd-add-btn" class="sp-btn-save">+ Add Countdown</button>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
